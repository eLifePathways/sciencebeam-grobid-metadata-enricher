services:
  grobid:
    image: ghcr.io/elifepathways/sciencebeam-parser:0.1.18
    ports:
      - "8070:8070"
    volumes:
      - grobid-cache:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8070/api/isalive"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      - GROBID_URL=http://grobid:8070/api
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
    depends_on:
      grobid:
        condition: service_healthy

  benchmark:
    build:
      context: .
      dockerfile: Dockerfile
      target: benchmark
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - GROBID_URL=http://grobid:8070/api
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      # - AOAI_POOL_PATH=/app/runtime/aoai_pool.json
    volumes:
      - grobid-cache:/root/.cache
      - ./benchmarks/runs:/app/benchmarks/runs
      - ./runtime:/app/runtime
    depends_on:
      grobid:
        condition: service_healthy
    profiles:
      - benchmark

volumes:
  grobid-cache:
