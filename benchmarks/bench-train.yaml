dataset:
  repo_id: elifepathways/sciencebeam-v2-benchmarking
  revision: main  # TODO: pin a tag (e.g. v1.0.0) once ready
  files:
    ore:
      file: ore-jats/train-00000-of-00001.parquet
      id_column: ppr_id
    pkp:
      file: pkp-jats/train-00000-of-00001.parquet
      id_column: ppr_id
    scielo_br:
      file: scielo_br-jats/train-00000-of-00001.parquet
      id_column: ppr_id
    scielo_mx:
      file: scielo_mx-jats/train-00000-of-00001.parquet
      id_column: ppr_id
    scielo_preprints-jats:
      file: scielo-preprints-jats/train-00000-of-00001.parquet
      id_column: ppr_id

corpora:
  # - biorxiv
  - ore
  - pkp
  - scielo_br
  - scielo_mx
  - scielo_preprints-jats

# Dataset row counts at revision main:
#   biorxiv 158, ore 199, pkp 200, scielo_br 200, scielo_mx 112, scielo_preprints_jats 1000
sampling:
  full:
    # biorxiv: 158
    ore: 199
    pkp: 200
    scielo_br: 200
    scielo_mx: 112
    scielo_preprints-jats: 1000
  smoke:
    # biorxiv: 25
    ore: 25
    pkp: 25
    scielo_br: 25
    scielo_mx: 25
    scielo_preprints-jats: 25

seeds:
  sample: 42
  llm: 0

metrics:
  - title_match
  - authors_recall
  - abstract_recall
  - abstract_edit_sim
  - keywords_recall
  - language_match
  - identifiers_recall
  # Gated on the corresponding gold keys; silent for biorxiv / scielo_preprints.
  - body_section_recall
  - figure_caption_recall
  - table_caption_recall
  - reference_recall
  - reference_recall_combined

bootstrap:
  n_resamples: 200
  confidence_level: 0.95

doc_concurrency: 4   # lfoppiano/grobid:0.9.0-crf saturates at ~4-6 parallel; 10 hits HTTP 503
llm:
  temperature: 0.0
  max_tokens: 800
  workers: 5
  concurrency: 20

grobid:
  url: http://localhost:8070/api
  pdfalto_start_page: 1
  pdfalto_end_page: 5
