dataset:
  repo_id: elifepathways/sciencebeam-v2-benchmarking
  revision: main  # TODO: pin a tag (e.g. v1.0.0) once ready
  files:
    biorxiv:
      file: biorxiv-jats/train-00000-of-00001.parquet
      id_column: ppr_id
    ore:
      file: ore-jats/train-00000-of-00001.parquet
      id_column: ppr_id
    pkp:
      file: pkp-jats/train-00000-of-00001.parquet
      id_column: ppr_id
    scielo_br:
      file: scielo_br-jats/train-00000-of-00001.parquet
      id_column: ppr_id
    scielo_mx:
      file: scielo_mx-jats/train-00000-of-00001.parquet
      id_column: ppr_id
    scielo_preprints-jats:
      file: scielo-preprints-jats/train-00000-of-00001.parquet
      id_column: ppr_id

corpora:
  - biorxiv
  - ore
  - pkp
  - scielo_br
  - scielo_mx
  - scielo_preprints-jats

# Dataset row counts at revision main:
#   biorxiv 158, ore 199, pkp 200, scielo_br 200, scielo_mx 112, scielo_preprints_jats 1000
sampling:
  full:
    biorxiv: 158
    ore: 199
    pkp: 200
    scielo_br: 200
    scielo_mx: 112
    scielo_preprints-jats: 1000
  smoke:
    biorxiv: 25
    ore: 25
    pkp: 25
    scielo_br: 25
    scielo_mx: 25
    scielo_preprints-jats: 25

seeds:
  sample: 42
  llm: 0

metrics:
  - title_match
  - title_edit_sim
  - authors_f1
  - abstract_f1
  - abstract_edit_sim
  - keywords_f1
  - language_match
  - identifiers_f1
  # Gated on (gold has field) AND (pipeline actually extracted the field for this corpus).
  - body_section_f1
  - figure_caption_f1
  - table_caption_f1
  - reference_f1
  - reference_combined_f1

bootstrap:
  n_resamples: 200
  confidence_level: 0.95

doc_concurrency: 4   # legacy one-stage fallback
parse_concurrency: 4   # lfoppiano/grobid:0.9.0-crf saturates at ~4-6 parallel; 10 hits HTTP 503
llm_doc_concurrency: 12
llm:
  temperature: 0.0
  max_tokens: 800
  workers: 5
  concurrency: 48
  routing: stable

grobid:
  url: http://localhost:8070/api
  pdfalto_start_page: 1
  pdfalto_end_page: 5
