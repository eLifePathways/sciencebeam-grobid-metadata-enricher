dataset:
  repo_id: elifepathways/sciencebeam-v2-benchmarking
  revision: main  # TODO: pin a tag (e.g. v1.0.0) once ready
  files:
    biorxiv: biorxiv.parquet
    ore: ore.parquet
    pkp: pkp.parquet
    scielo_br: scielo_br.parquet
    scielo_mx: scielo_mx.parquet
    scielo_preprints: scielo_preprints.parquet

corpora: [biorxiv, ore, pkp, scielo_br, scielo_mx, scielo_preprints]

# Dataset row counts at revision main:
#   biorxiv 158, ore 199, pkp 200, scielo_br 200, scielo_mx 112, scielo_preprints 1000
sampling:
  full:
    biorxiv: 158
    ore: 199
    pkp: 200
    scielo_br: 200
    scielo_mx: 112
    scielo_preprints: 1000
  smoke:
    biorxiv: 25
    ore: 25
    pkp: 25
    scielo_br: 25
    scielo_mx: 25
    scielo_preprints: 25

seeds:
  sample: 42
  llm: 0

metrics: [title_match, authors_recall, abstract_recall, keywords_recall, language_match, identifiers_recall]

bootstrap:
  n_resamples: 200
  confidence_level: 0.95

doc_concurrency: 10  # parallel documents through Grobid/pdfalto/LLM (<= Grobid engine pool default)
llm:
  temperature: 0.0
  max_tokens: 800
  workers: 5
  concurrency: 20

grobid:
  url: http://localhost:8070/api
  pdfalto_start_page: 1
  pdfalto_end_page: 5
