name: bench-all

# One-shot benchmark comparing Grobid, base Qwen, Qwen+LoRA pack and Azure
# side-by-side on the same documents. Provisions a single Qwen 8xA100 spot
# VM (preloaded with the v1 LoRA pack), runs predict three times against
# different backends, then produces a unified report via score_multi.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Bench mode'
        required: false
        default: smoke
        type: choice
        options: [smoke, full]
  pull_request:
    types: [labeled]

permissions:
  contents: read
  id-token: write       # WIF
  pull-requests: write  # cml comment

jobs:
  bench-all:
    if: github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.label.name == 'bench:all')
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      AOAI_POOL_JSON: ${{ secrets.AOAI_POOL_JSON }}
      VM_NAME: bench-all-${{ github.run_id }}
      RUN_DIR: benchmarks/runs/${{ github.run_id }}

    services:
      grobid:
        image: lfoppiano/grobid:0.9.0-crf
        ports: ["8070:8070"]
        options: >-
          --health-cmd "curl -sf http://localhost:8070/api/isalive || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_BENCH_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: uv sync --extra bench --extra dev

      - name: Extract pdfalto from Grobid image
        run: |
          docker create --name pdfalto_src lfoppiano/grobid:0.9.0-crf
          docker cp pdfalto_src:/opt/grobid/grobid-home/pdfalto/lin-64/pdfalto ./pdfalto
          sudo install -m 755 ./pdfalto /usr/local/bin/pdfalto
          docker rm pdfalto_src

      - name: Materialise Azure pool secret
        run: |
          mkdir -p runtime
          printf '%s' "$AOAI_POOL_JSON" > runtime/aoai_pool.json
          python3 -c "import json; json.load(open('runtime/aoai_pool.json'))" \
            || { echo "::error::AOAI_POOL_JSON secret is not valid JSON"; exit 1; }

      - name: Build LoRA pack (v1 preset)
        id: pack
        env:
          BUCKET: gs://${{ vars.GCP_LORA_BUCKET }}
        run: |
          set -euo pipefail
          names=(body_sections_v1 figure_captions_v1 header_metadata_v1 identifiers_v1 keywords_v1 references_v1 table_captions_v1)
          : > /tmp/lora_pack.tsv
          for n in "${names[@]}"; do
            printf "%s\t%s/lora/%s/\n" "$n" "$BUCKET" "$n" >> /tmp/lora_pack.tsv
          done
          cat > /tmp/step_lora_map.json <<'EOF'
          {"HEADER_METADATA":"header_metadata_v1","TEI_METADATA":"header_metadata_v1","TEI_VALIDATED":"header_metadata_v1","CONTENT_BODY_SECTIONS":"body_sections_v1","CONTENT_REFERENCES":"references_v1","CONTENT_FIGURE_CAPTIONS":"figure_captions_v1","CONTENT_TABLE_CAPTIONS":"table_captions_v1","KEYWORD_TRANSLATE":"keywords_v1","KEYWORD_SELECT":"keywords_v1","KEYWORD_EXTRACT":"keywords_v1","KEYWORD_INFER":"keywords_v1","IDENTIFIER_SELECT":"identifiers_v1"}
          EOF

      - name: Provision Qwen spot cluster
        id: provision
        env:
          PROJECT: ${{ vars.GCP_PROJECT }}
          NAME: ${{ env.VM_NAME }}
          LORA_PACK_FILE: /tmp/lora_pack.tsv
          LORA_MAX_RANK: '16'
        run: |
          out=$(bash deploy/qwen/create-vm.sh)
          echo "$out"
          ip=$(echo "$out" | awk -F= '/^EXTERNAL_IP=/ {print $2}' | tail -1)
          zone=$(echo "$out" | awk -F= '/^ZONE=/ {print $2}' | tail -1)
          echo "ip=$ip"     >> "$GITHUB_OUTPUT"
          echo "zone=$zone" >> "$GITHUB_OUTPUT"
          test -n "$ip" -a -n "$zone"

      - name: Wait for 8 vLLM replicas
        env:
          IP: ${{ steps.provision.outputs.ip }}
          MODEL_NAME: 'Qwen/Qwen2.5-7B-Instruct'
        run: |
          payload=$(printf '{"model":"%s","messages":[{"role":"user","content":"hi"}],"max_tokens":1,"temperature":0}' "$MODEL_NAME")
          deadline=$(( $(date +%s) + 900 ))   # 15 min: multi-LoRA preload adds ~3 min vs single
          while [ "$(date +%s)" -lt "$deadline" ]; do
            ready=0
            for i in 0 1 2 3 4 5 6 7; do
              code=$(curl -s -o /dev/null -w '%{http_code}' -m 5 \
                -X POST "http://${IP}:$((8000+i))/v1/chat/completions" \
                -H 'Content-Type: application/json' \
                --data "$payload" || echo "000")
              [ "$code" = "200" ] && ready=$((ready+1))
            done
            echo "[$(date +%H:%M:%S)] $ready/8 vLLM ready"
            if [ "$ready" -eq 8 ]; then exit 0; fi
            sleep 15
          done
          echo "::error::only $ready/8 vLLM replicas ready after 15 min"
          exit 1

      - name: Build Qwen pool JSON
        env:
          IP: ${{ steps.provision.outputs.ip }}
        run: |
          mkdir -p runtime
          python3 - <<PY > runtime/qwen_pool.json
          import json
          ip = "${IP}"
          print(json.dumps([
              {"id": f"qwen-{i}",
               "endpoint": f"http://{ip}:{8000+i}",
               "deployment": "Qwen/Qwen2.5-7B-Instruct",
               "apiKey": "local",
               "apiVersion": "unused",
               "kind": "openai"}
              for i in range(8)
          ], indent=2))
          PY

      - name: Predict — base Qwen
        env:
          PDFALTO_BIN: /usr/local/bin/pdfalto
        run: |
          uv run python -m benchmarks.predict \
            --config benchmarks/bench.yaml \
            --mode   ${{ inputs.mode || 'smoke' }} \
            --out    "$RUN_DIR/qwen_base" \
            --pool-path runtime/qwen_pool.json

      - name: Share Grobid/pdfalto artefacts across remaining runs
        run: |
          # Predict reuses existing tei/alto files when present, so hardlinking
          # them into the other sub-run dirs skips re-extraction (saves ~5-8 min).
          for sub in qwen_lora azure; do
            for corpus_dir in "$RUN_DIR/qwen_base"/*/; do
              corpus=$(basename "$corpus_dir")
              for kind in tei alto; do
                src="$corpus_dir/$kind"
                if [ -d "$src" ]; then
                  dst="$RUN_DIR/$sub/$corpus/$kind"
                  mkdir -p "$dst"
                  cp -al "$src"/. "$dst"/ 2>/dev/null || cp -r "$src"/. "$dst"/
                fi
              done
            done
          done

      - name: Predict — Qwen + LoRA pack
        env:
          PDFALTO_BIN: /usr/local/bin/pdfalto
        run: |
          STEP_LORA_MAP_JSON="$(cat /tmp/step_lora_map.json)" \
          uv run python -m benchmarks.predict \
            --config benchmarks/bench.yaml \
            --mode   ${{ inputs.mode || 'smoke' }} \
            --out    "$RUN_DIR/qwen_lora" \
            --pool-path runtime/qwen_pool.json

      - name: Predict — Azure
        env:
          PDFALTO_BIN: /usr/local/bin/pdfalto
        run: |
          uv run python -m benchmarks.predict \
            --config benchmarks/bench.yaml \
            --mode   ${{ inputs.mode || 'smoke' }} \
            --out    "$RUN_DIR/azure" \
            --pool-path runtime/aoai_pool.json

      - name: Score (side-by-side)
        run: |
          uv run python -m benchmarks.score_multi \
            --config benchmarks/bench.yaml \
            --run base=$RUN_DIR/qwen_base \
            --run lora=$RUN_DIR/qwen_lora \
            --run azure=$RUN_DIR/azure \
            --out $RUN_DIR/report.md \
            --title "bench-all ${{ github.run_id }}"
          echo "===REPORT==="
          cat $RUN_DIR/report.md

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-all-${{ github.run_id }}
          path: |
            ${{ env.RUN_DIR }}/report.md
            ${{ env.RUN_DIR }}/*/per_document.jsonl
            ${{ env.RUN_DIR }}/*/run_record.json
            ${{ env.RUN_DIR }}/*/errors.json
          retention-days: 30

      - name: Install CML
        if: github.event_name == 'pull_request'
        run: npm install -g @dvcorg/cml
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create $RUN_DIR/report.md

      - name: Tear down Qwen spot cluster
        if: always() && steps.provision.outputs.ip
        env:
          PROJECT: ${{ vars.GCP_PROJECT }}
        run: |
          gcloud compute instances delete ${{ env.VM_NAME }} \
            --project="$PROJECT" \
            --zone="${{ steps.provision.outputs.zone }}" \
            --quiet || true
