name: qwen-bench

# Full end-to-end Qwen-on-spot-A100 bench, triggered from CI.
# Provisions an 8x A100 SPOT VM (baked image qwen-bench), optionally
# loads a LoRA adapter from GCS, runs bench.yaml smoke, tears down.
#
# WIF setup: deploy/qwen/setup-wif.sh produces the SA + provider; set
# GCP_PROJECT / GCP_WIF_PROVIDER / GCP_BENCH_SA / GCP_LORA_BUCKET as
# repo Variables (Settings > Variables).

on:
  workflow_dispatch:
    inputs:
      lora_gcs_uri:
        description: 'GCS URI of the LoRA adapter, e.g. gs://<bucket>/lora/v2/. Omit to bench base Qwen.'
        required: false
        type: string
      lora_name:
        description: 'LoRA name (also the OpenAI model= field). Default v2.'
        required: false
        default: v2
        type: string
      lora_max_rank:
        description: 'vLLM --max-lora-rank. Must be >= adapter rank. Default 16.'
        required: false
        default: '16'
        type: string
      mode:
        description: 'Bench mode'
        required: false
        default: smoke
        type: choice
        options: [smoke, full]
  pull_request:
    types: [labeled]

permissions:
  contents: read
  id-token: write   # WIF

jobs:
  qwen-bench:
    # Only on the right label for PRs; always on workflow_dispatch.
    if: github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.label.name == 'bench:qwen')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      VM_NAME: qwen-bench-${{ github.run_id }}

    services:
      grobid:
        image: lfoppiano/grobid:0.9.0-crf
        ports: ["8070:8070"]
        options: >-
          --health-cmd "curl -sf http://localhost:8070/api/isalive || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_BENCH_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Provision spot cluster
        id: provision
        env:
          PROJECT: ${{ vars.GCP_PROJECT }}
          NAME: ${{ env.VM_NAME }}
          LORA_GCS_URI: ${{ inputs.lora_gcs_uri }}
          LORA_NAME: ${{ inputs.lora_name }}
          LORA_MAX_RANK: ${{ inputs.lora_max_rank }}
        run: |
          out=$(bash deploy/qwen/create-vm.sh)
          echo "$out"
          ip=$(echo "$out" | awk -F= '/^EXTERNAL_IP=/ {print $2}' | tail -1)
          zone=$(echo "$out" | awk -F= '/^ZONE=/ {print $2}' | tail -1)
          echo "ip=$ip"     >> "$GITHUB_OUTPUT"
          echo "zone=$zone" >> "$GITHUB_OUTPUT"
          test -n "$ip" -a -n "$zone"

      - name: Wait for 8 vLLM replicas to be healthy
        env:
          IP: ${{ steps.provision.outputs.ip }}
        run: |
          deadline=$(( $(date +%s) + 600 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            ready=0
            for i in 0 1 2 3 4 5 6 7; do
              if curl -sf -m 3 "http://${IP}:$((8000+i))/health" >/dev/null; then
                ready=$((ready+1))
              fi
            done
            if [ "$ready" -eq 8 ]; then echo "ALL_READY"; exit 0; fi
            sleep 10
          done
          echo "::error::only $ready/8 vLLM replicas healthy after 10 min"
          exit 1

      - name: Build pool JSON
        env:
          IP: ${{ steps.provision.outputs.ip }}
          MODEL_NAME: ${{ inputs.lora_gcs_uri && inputs.lora_name || 'Qwen/Qwen2.5-7B-Instruct' }}
        run: |
          mkdir -p runtime
          python3 - <<PY > runtime/qwen_pool.json
          import json
          ip = "${IP}"
          name = "${MODEL_NAME}"
          print(json.dumps([
              {"id": f"qwen-{i}",
               "endpoint": f"http://{ip}:{8000+i}",
               "deployment": name,
               "apiKey": "local",
               "apiVersion": "unused",
               "kind": "openai"}
              for i in range(8)
          ], indent=2))
          PY
          python3 -c "import json; print(len(json.load(open('runtime/qwen_pool.json'))), 'backends')"

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: uv sync --extra bench --extra dev

      - name: Extract pdfalto
        run: |
          docker create --name pdfalto_src lfoppiano/grobid:0.9.0-crf
          docker cp pdfalto_src:/opt/grobid/grobid-home/pdfalto/lin-64/pdfalto ./pdfalto
          sudo install -m 755 ./pdfalto /usr/local/bin/pdfalto
          docker rm pdfalto_src

      - name: Run predict
        env:
          PDFALTO_BIN: /usr/local/bin/pdfalto
          AOAI_POOL_PATH: ${{ github.workspace }}/runtime/qwen_pool.json
        run: |
          uv run python -m benchmarks.predict \
            --config benchmarks/bench.yaml \
            --mode   ${{ inputs.mode }} \
            --out    benchmarks/runs/${{ github.run_id }} \
            --pool-path runtime/qwen_pool.json

      - name: Score
        run: |
          uv run python -m benchmarks.score \
            --run    benchmarks/runs/${{ github.run_id }} \
            --config benchmarks/bench.yaml \
            --out    benchmarks/runs/${{ github.run_id }}/report.md
          echo "===REPORT==="
          cat benchmarks/runs/${{ github.run_id }}/report.md

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qwen-bench-${{ github.run_id }}
          path: |
            benchmarks/runs/${{ github.run_id }}/*.md
            benchmarks/runs/${{ github.run_id }}/*.json
            benchmarks/runs/${{ github.run_id }}/*.jsonl
          retention-days: 30

      - name: Tear down spot cluster
        if: always() && steps.provision.outputs.ip
        env:
          PROJECT: ${{ vars.GCP_PROJECT }}
        run: |
          gcloud compute instances delete ${{ env.VM_NAME }} \
            --project="$PROJECT" \
            --zone="${{ steps.provision.outputs.zone }}" \
            --quiet || true
