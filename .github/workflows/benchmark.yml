name: benchmark

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  schedule:
    - cron: "0 3 * * *"   # nightly smoke run at 03:00 UTC
  push:
    branches: [main]

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    # Always runs smoke mode. Trigger rules:
    #  - workflow_dispatch: manual
    #  - PR labeled 'benchmark:smoke'
    #  - schedule: nightly
    #  - push to main
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'benchmark:smoke')) ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: write

    services:
      grobid:
        image: lfoppiano/grobid:0.9.0-crf
        ports: ["8070:8070"]
        options: >-
          --health-cmd "curl -sf http://localhost:8070/api/isalive || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      AOAI_POOL_JSON: ${{ secrets.AOAI_POOL_JSON }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for baseline commit resolution

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: uv sync --extra bench --extra dev

      # Reuses the Grobid image's bundled pdfalto (same pattern as ./Dockerfile).
      - name: Extract pdfalto from Grobid image
        run: |
          docker create --name pdfalto_src lfoppiano/grobid:0.9.0-crf
          docker cp pdfalto_src:/opt/grobid/grobid-home/pdfalto/lin-64/pdfalto ./pdfalto
          sudo install -m 755 ./pdfalto /usr/local/bin/pdfalto
          docker rm pdfalto_src
          pdfalto 2>&1 | head -1 || true

      - name: Materialise AOAI pool secret
        if: env.AOAI_POOL_JSON != ''
        run: |
          mkdir -p runtime
          printf '%s' "$AOAI_POOL_JSON" > runtime/aoai_pool.json
          size=$(wc -c < runtime/aoai_pool.json)
          echo "pool file size: $size bytes"
          if [ "$size" -lt 20 ]; then
            echo "::error::AOAI_POOL_JSON secret is suspiciously small ($size bytes); did you paste a path instead of the file content?"
            exit 1
          fi
          python3 -c "import json; json.load(open('runtime/aoai_pool.json'))" \
            || { echo "::error::AOAI_POOL_JSON secret is not valid JSON"; exit 1; }

      - name: Wait for Grobid
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8070/api/isalive; then
              echo; echo "Grobid up"; exit 0
            fi
            sleep 2
          done
          echo "Grobid never became healthy" >&2; exit 1

      # Grobid + pdfalto are deterministic for a fixed (image tag, dataset revision,
      # corpus, record_id). Cache their per-record outputs across runs so we only
      # pay the cold-extraction cost when bench.yaml changes (which busts the key).
      - name: Restore grobid/pdfalto cache
        uses: actions/cache@v4
        with:
          path: benchmarks/cache
          key: bench-grobid-${{ runner.os }}-0.9.0-crf-${{ hashFiles('benchmarks/bench.yaml') }}
          restore-keys: |
            bench-grobid-${{ runner.os }}-0.9.0-crf-

      - name: Hydrate run dir from cache
        run: |
          set -eu
          SRC=benchmarks/cache
          DST=benchmarks/runs/${{ github.sha }}
          mkdir -p "$DST"
          if [ -d "$SRC" ]; then
            rsync -a "$SRC"/ "$DST"/
            cached=$(find "$DST" \( -name '*.tei.xml' -o -name '*.alto.xml' \) | wc -l)
            echo "Cached TEI/ALTO files restored: $cached"
          else
            echo "No prior cache to restore."
          fi

      - name: Run predict
        env:
          PDFALTO_BIN: /usr/local/bin/pdfalto
          AOAI_POOL_PATH: ${{ github.workspace }}/runtime/aoai_pool.json
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_MODEL: qwen/qwen3.5-9b
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
        run: |
          uv run python -m benchmarks.predict \
            --config benchmarks/bench.yaml \
            --mode smoke \
            --out  benchmarks/runs/${{ github.sha }} \
            --pool-path runtime/aoai_pool.json

      - name: Mirror TEI/ALTO back to cache
        if: always()
        run: |
          set -eu
          SRC=benchmarks/runs/${{ github.sha }}
          DST=benchmarks/cache
          mkdir -p "$DST"
          rsync -a \
            --include='*/' \
            --include='*.tei.xml' \
            --include='*.alto.xml' \
            --exclude='*' \
            "$SRC"/ "$DST"/
          echo "Cache size: $(find "$DST" -type f | wc -l) files"

      - name: Fetch baseline run (main) if available
        id: baseline
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow benchmark.yml --branch main --status success --limit 1 --json databaseId,headSha > runs.json || true
          if [ -s runs.json ]; then
            RUN_ID=$(python -c "import json,sys; d=json.load(open('runs.json')); print(d[0]['databaseId'] if d else '')")
            HEAD=$(python  -c "import json,sys; d=json.load(open('runs.json')); print(d[0]['headSha']    if d else '')")
            if [ -n "$RUN_ID" ] && [ -n "$HEAD" ]; then
              mkdir -p benchmarks/runs/baseline
              gh run download "$RUN_ID" --name "benchmark-run-$HEAD" --dir benchmarks/runs/baseline || true
              if [ -f benchmarks/runs/baseline/per_document.jsonl ]; then
                echo "have_baseline=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          fi

      - name: Score
        run: |
          BASELINE_ARG=""
          if [ "${{ steps.baseline.outputs.have_baseline }}" = "true" ]; then
            BASELINE_ARG="--baseline benchmarks/runs/baseline"
          fi
          uv run python -m benchmarks.score \
            --run benchmarks/runs/${{ github.sha }} \
            --config benchmarks/bench.yaml \
            --out benchmarks/runs/${{ github.sha }}/report.md \
            $BASELINE_ARG

      - name: Upload run artefacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-run-${{ github.sha }}
          path: |
            benchmarks/runs/${{ github.sha }}/*.md
            benchmarks/runs/${{ github.sha }}/*.json
            benchmarks/runs/${{ github.sha }}/*.jsonl
          retention-days: 30

      # PRs from forked repos do not receive secrets, so BENCH_PG_DSN is empty
      # and the gate skips the rest. Internal pushes/PRs/schedule runs all see
      # the secret and publish to Postgres.
      - name: Gate Postgres export
        id: gate_export
        env:
          BENCH_PG_DSN: ${{ secrets.BENCH_PG_DSN }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -n "${BENCH_PG_DSN:-}" ] && [ -n "${AZURE_CREDENTIALS:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Postgres export skipped (BENCH_PG_DSN or AZURE_CREDENTIALS unset)."
          fi

      - name: Azure login
        if: steps.gate_export.outputs.enabled == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Export run to Postgres
        if: steps.gate_export.outputs.enabled == 'true'
        env:
          BENCH_PG_DSN: ${{ secrets.BENCH_PG_DSN }}
          AZURE_PG_RG: ${{ vars.AZURE_PG_RG || 'sb-bench-rg' }}
          AZURE_PG_SERVER: ${{ vars.AZURE_PG_SERVER || 'sb-bench-pg-leon' }}
        run: |
          set -euo pipefail
          RUNNER_IP=$(curl -fsSL https://api.ipify.org)
          RULE="gha-${{ github.run_id }}"
          az postgres flexible-server firewall-rule create \
            -g "$AZURE_PG_RG" --name "$AZURE_PG_SERVER" \
            --rule-name "$RULE" \
            --start-ip-address "$RUNNER_IP" --end-ip-address "$RUNNER_IP" \
            --output none
          trap 'az postgres flexible-server firewall-rule delete -g "$AZURE_PG_RG" --name "$AZURE_PG_SERVER" --rule-name "$RULE" --yes --output none || true' EXIT
          uv run python -m benchmarks.export \
            --run-dir   benchmarks/runs/${{ github.sha }} \
            --ci-run-id ${{ github.run_id }}

      - name: Install CML via npm (avoids setup-cml's unauthenticated release fetch)
        run: npm install -g @dvcorg/cml
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml comment create benchmarks/runs/${{ github.sha }}/report.md
