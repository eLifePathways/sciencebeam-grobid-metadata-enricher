name: benchmark

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "benchmark mode (smoke=50 docs, full=1000 docs)"
        type: choice
        options: [smoke, full]
        default: smoke
  pull_request:
    types: [labeled]
  schedule:
    - cron: "0 3 * * *"   # nightly full run at 03:00 UTC
  push:
    branches: [main]

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    # Trigger rules:
    #  - workflow_dispatch: always runs, uses inputs.mode
    #  - PR labeled 'benchmark:smoke': smoke
    #  - schedule / push to main: full
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'benchmark:smoke') ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: write

    services:
      grobid:
        image: lfoppiano/grobid:0.9.0-crf
        ports: ["8070:8070"]
        options: >-
          --health-cmd "curl -sf http://localhost:8070/api/isalive || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      AOAI_POOL_JSON: ${{ secrets.AOAI_POOL_JSON }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for baseline commit resolution

      - name: Decide run mode
        id: mode
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch) echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT" ;;
            pull_request)      echo "mode=smoke"            >> "$GITHUB_OUTPUT" ;;
            *)                 echo "mode=full"             >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: uv sync --extra bench --extra dev

      # Reuses the Grobid image's bundled pdfalto (same pattern as ./Dockerfile).
      - name: Extract pdfalto from Grobid image
        run: |
          docker create --name pdfalto_src lfoppiano/grobid:0.9.0-crf
          docker cp pdfalto_src:/opt/grobid/grobid-home/pdfalto/lin-64/pdfalto ./pdfalto
          sudo install -m 755 ./pdfalto /usr/local/bin/pdfalto
          docker rm pdfalto_src
          pdfalto 2>&1 | head -1 || true

      - name: Materialise AOAI pool secret
        run: |
          mkdir -p runtime
          printf '%s' "$AOAI_POOL_JSON" > runtime/aoai_pool.json
          test -s runtime/aoai_pool.json

      - name: Wait for Grobid
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8070/api/isalive; then
              echo; echo "Grobid up"; exit 0
            fi
            sleep 2
          done
          echo "Grobid never became healthy" >&2; exit 1

      - name: Run predict
        env:
          PDFALTO_BIN: /usr/local/bin/pdfalto
          AOAI_POOL_PATH: ${{ github.workspace }}/runtime/aoai_pool.json
        run: |
          uv run python -m benchmarks.predict \
            --config benchmarks/bench.yaml \
            --mode ${{ steps.mode.outputs.mode }} \
            --out  benchmarks/runs/${{ github.sha }} \
            --pool-path runtime/aoai_pool.json

      - name: Fetch baseline run (main) if available
        id: baseline
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow benchmark.yml --branch main --status success --limit 1 --json databaseId,headSha > runs.json || true
          if [ -s runs.json ]; then
            RUN_ID=$(python -c "import json,sys; d=json.load(open('runs.json')); print(d[0]['databaseId'] if d else '')")
            HEAD=$(python  -c "import json,sys; d=json.load(open('runs.json')); print(d[0]['headSha']    if d else '')")
            if [ -n "$RUN_ID" ] && [ -n "$HEAD" ]; then
              mkdir -p benchmarks/runs/baseline
              gh run download "$RUN_ID" --name "benchmark-run-$HEAD" --dir benchmarks/runs/baseline || true
              if [ -f benchmarks/runs/baseline/per_document.jsonl ]; then
                echo "have_baseline=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          fi

      - name: Score
        run: |
          BASELINE_ARG=""
          if [ "${{ steps.baseline.outputs.have_baseline }}" = "true" ]; then
            BASELINE_ARG="--baseline benchmarks/runs/baseline"
          fi
          uv run python -m benchmarks.score \
            --run benchmarks/runs/${{ github.sha }} \
            --config benchmarks/bench.yaml \
            --out benchmarks/runs/${{ github.sha }}/report.md \
            $BASELINE_ARG

      - name: Upload run artefacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-run-${{ github.sha }}
          path: benchmarks/runs/${{ github.sha }}
          retention-days: 30

      - uses: iterative/setup-cml@v2
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml comment create benchmarks/runs/${{ github.sha }}/report.md

      # Optional: regression gate on one headline metric (overall LLM title_match).
      # Emits a single value in `customSmallerIsBetter` format with the metric negated,
      # so a *drop* in title_match looks like an *increase* to github-action-benchmark.
      - name: Emit headline metric for regression gate
        id: headline
        run: |
          uv run python - <<'PY'
          import json, pathlib
          m = json.loads(pathlib.Path("benchmarks/runs/${{ github.sha }}/metrics.json").read_text())
          mean = m["overall"]["metrics"]["title_match"]["llm"]["mean"]
          # Negate so "smaller is better" = "less negative title_match" = "higher title_match".
          rec = [{"name": "overall.llm.title_match (inverted)", "unit": "score", "value": -mean}]
          pathlib.Path("headline.json").write_text(json.dumps(rec))
          PY
      - name: Regression alert (github-action-benchmark)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: headline.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          fail-on-alert: false   # flip to true once the gate is trusted
          alert-threshold: "105%"   # alert if inverted metric grows >5% (= title_match dropped >5%)
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
