<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScienceBeam V2</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>ScienceBeam V2</h1>
  </header>

  <main>
    <section id="upload-section">
      <div id="drop-zone">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <p id="drop-label">Drop PDF here</p>
        <p class="or-text">or</p>
        <label for="file-input" class="browse-btn">Browse&hellip;</label>
        <input type="file" id="file-input" accept=".pdf">
        <p id="drop-error" hidden></p>
      </div>
      <p id="file-name" hidden></p>
      <button id="submit-btn" disabled>Transform PDF</button>
    </section>

    <div id="status-section" hidden>
      <div class="spinner" aria-hidden="true"></div>
      <p>Processing PDF&hellip; this may take up to a minute.</p>
    </div>

    <div id="error-section" hidden>
      <p id="error-message"></p>
      <button id="error-dismiss" aria-label="Dismiss error">&#x2715;</button>
    </div>

    <section id="results-section" hidden>
      <h2>Extracted Metadata</h2>
      <div class="fields">
        <div class="field">
          <label for="f-title">Title</label>
          <input id="f-title" type="text" readonly>
        </div>
        <div class="field field-textarea">
          <label for="f-abstract">Abstract</label>
          <textarea id="f-abstract" readonly rows="5"></textarea>
        </div>
        <div class="field">
          <label for="f-publisher">Publisher</label>
          <input id="f-publisher" type="text" readonly>
        </div>
        <div class="field">
          <label for="f-date">Date</label>
          <input id="f-date" type="text" readonly>
        </div>
        <div class="field">
          <label for="f-language">Language</label>
          <input id="f-language" type="text" readonly>
        </div>
        <div class="field">
          <label for="f-rights">Rights</label>
          <input id="f-rights" type="text" readonly>
        </div>
        <div class="field field-list">
          <label>Authors</label>
          <div class="list-inputs" id="f-authors"></div>
        </div>
        <div class="field field-list">
          <label>Affiliations</label>
          <div class="list-inputs" id="f-affiliations"></div>
        </div>
        <div class="field field-list">
          <label>Keywords</label>
          <div class="list-inputs" id="f-keywords"></div>
        </div>
        <div class="field field-list">
          <label>Identifiers</label>
          <div class="list-inputs" id="f-identifiers"></div>
        </div>
        <div class="field field-list">
          <label>Relations</label>
          <div class="list-inputs" id="f-relations"></div>
        </div>
        <div class="field field-list">
          <label>Types</label>
          <div class="list-inputs" id="f-types"></div>
        </div>
        <div class="field field-list">
          <label>Formats</label>
          <div class="list-inputs" id="f-formats"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
