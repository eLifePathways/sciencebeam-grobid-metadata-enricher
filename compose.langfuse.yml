services:
  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: local-dev-secret
      SALT: local-dev-salt
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
      # Pre-provision a project with fixed keys so no manual UI setup is needed.
      LANGFUSE_INIT_ORG_ID: local
      LANGFUSE_INIT_ORG_NAME: Local
      LANGFUSE_INIT_PROJECT_ID: local-project
      LANGFUSE_INIT_PROJECT_NAME: sciencebeam
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local
      LANGFUSE_INIT_USER_EMAIL: admin@local.dev
      LANGFUSE_INIT_USER_NAME: admin
      LANGFUSE_INIT_USER_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname -i):3000/api/public/health | grep -q OK"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  langfuse-db:
